<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXE - Modern Fashion Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
          colors: {
            accent: '#E85D04',
            accentLight: '#F48C06',
            accentDark: '#DC2F02',
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E85D04; border-radius: 3px; }
    
    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #E85D04 0%, #F48C06 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Noise texture overlay */
    .noise-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.02;
      pointer-events: none;
    }
    
    /* Loading animation */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    .shimmer {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    
    /* Pulse glow */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(232, 93, 4, 0.3); }
      50% { box-shadow: 0 0 40px rgba(232, 93, 4, 0.5); }
    }
    
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    
    /* Float animation */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .float { animation: float 3s ease-in-out infinite; }
    
    /* Hide scrollbar */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-white transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext } = React;
    const { motion, AnimatePresence } = Motion;

    // ============ CONTEXT ============
    const ShopContext = createContext();

    // ============ DATA ============
    const categories = [
      { id: 'all', name: 'Бүгд', icon: '🗂️' },
      { id: 'men', name: 'Эрэгтэй', icon: '👔' },
      { id: 'women', name: 'Эмэгтэй', icon: '👗' },
      { id: 'kids', name: 'Хүүхэд', icon: '🧒' },
      { id: 'accessories', name: 'Дагалдах', icon: '👜' },
      { id: 'shoes', name: 'Гутал', icon: '👟' },
    ];

    const products = [
      { id: 1, name: 'Premium Wool Coat', price: 459000, originalPrice: 599000, category: 'women', image: 'https://images.unsplash.com/photo-1539533018447-63fcce2678e3?w=500&q=80', rating: 4.8, reviews: 124, isNew: true, discount: 23 },
      { id: 2, name: 'Classic Leather Jacket', price: 389000, originalPrice: 450000, category: 'men', image: 'https://images.unsplash.com/photo-1551028719-00167b16eac5?w=500&q=80', rating: 4.9, reviews: 89, isNew: false, discount: 14 },
      { id: 3, name: 'Minimal White Sneakers', price: 289000, originalPrice: null, category: 'shoes', image: 'https://images.unsplash.com/photo-1549298916-b41d501d3772?w=500&q=80', rating: 4.7, reviews: 256, isNew: true, discount: 0 },
      { id: 4, name: 'Cashmere Sweater', price: 325000, originalPrice: 420000, category: 'men', image: 'https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=500&q=80', rating: 4.6, reviews: 67, isNew: false, discount: 23 },
      { id: 5, name: 'Silk Evening Dress', price: 520000, originalPrice: null, category: 'women', image: 'https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=500&q=80', rating: 4.9, reviews: 45, isNew: true, discount: 0 },
      { id: 6, name: 'Denim Premium Jeans', price: 198000, originalPrice: 250000, category: 'men', image: 'https://images.unsplash.com/photo-1542272604-787c3835535d?w=500&q=80', rating: 4.5, reviews: 312, isNew: false, discount: 21 },
      { id: 7, name: 'Designer Handbag', price: 680000, originalPrice: 850000, category: 'accessories', image: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500&q=80', rating: 4.8, reviews: 78, isNew: false, discount: 20 },
      { id: 8, name: 'Kids Winter Set', price: 165000, originalPrice: 200000, category: 'kids', image: 'https://images.unsplash.com/photo-1519238263530-99bdd11df2ea?w=500&q=80', rating: 4.7, reviews: 34, isNew: true, discount: 18 },
      { id: 9, name: 'Running Shoes Pro', price: 345000, originalPrice: null, category: 'shoes', image: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&q=80', rating: 4.9, reviews: 189, isNew: true, discount: 0 },
      { id: 10, name: 'Linen Summer Shirt', price: 145000, originalPrice: 180000, category: 'men', image: 'https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=500&q=80', rating: 4.4, reviews: 56, isNew: false, discount: 19 },
      { id: 11, name: 'Wool Blazer', price: 420000, originalPrice: null, category: 'women', image: 'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500&q=80', rating: 4.8, reviews: 92, isNew: false, discount: 0 },
      { id: 12, name: 'Leather Belt Premium', price: 85000, originalPrice: 110000, category: 'accessories', image: 'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=500&q=80', rating: 4.6, reviews: 145, isNew: false, discount: 23 },
    ];

    const recommendedProducts = products.slice(0, 4);

    // ============ UTILITIES ============
    const formatPrice = (price) => {
      return new Intl.NumberFormat('mn-MN').format(price) + '₮';
    };

    // ============ ICONS ============
    const Icons = {
      Search: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      ),
      Heart: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
        </svg>
      ),
      HeartFilled: () => (
        <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
        </svg>
      ),
      Cart: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
        </svg>
      ),
      User: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      ),
      Sun: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
      ),
      Moon: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      ),
      Close: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
        </svg>
      ),
      Menu: () => (
        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      ),
      Plus: () => (
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
        </svg>
      ),
      Minus: () => (
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 12H4" />
        </svg>
      ),
      Trash: () => (
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      ),
      Star: () => (
        <svg className="w-4 h-4 fill-amber-400" viewBox="0 0 24 24">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
        </svg>
      ),
      ArrowLeft: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      ),
      Check: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
        </svg>
      ),
      Truck: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 17h8M8 17a2 2 0 11-4 0m4 0a2 2 0 10-4 0m12 0a2 2 0 11-4 0m4 0a2 2 0 10-4 0M3 8h18M3 8v8m18-8v8M5 6h14a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2z" />
        </svg>
      ),
    };

    // ============ PROVIDER ============
    const ShopProvider = ({ children }) => {
      const [darkMode, setDarkMode] = useState(false);
      const [cart, setCart] = useState([]);
      const [wishlist, setWishlist] = useState([]);
      const [currentPage, setCurrentPage] = useState('home');
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [showLogin, setShowLogin] = useState(false);
      const [isLogin, setIsLogin] = useState(false);
      const [userInfo, setUserInfo] = useState(null);
      const [orders, setOrders] = useState([]);

      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      const addToCart = (product, quantity = 1) => {
        setCart(prev => {
          const existing = prev.find(item => item.id === product.id);
          if (existing) {
            return prev.map(item =>
              item.id === product.id
                ? { ...item, quantity: item.quantity + quantity }
                : item
            );
          }
          return [...prev, { ...product, quantity }];
        });
      };

      const removeFromCart = (productId) => {
        setCart(prev => prev.filter(item => item.id !== productId));
      };

      const updateQuantity = (productId, quantity) => {
        if (quantity < 1) return;
        setCart(prev =>
          prev.map(item =>
            item.id === productId ? { ...item, quantity } : item
          )
        );
      };

      const toggleWishlist = (product) => {
        setWishlist(prev => {
          const exists = prev.find(item => item.id === product.id);
          if (exists) {
            return prev.filter(item => item.id !== product.id);
          }
          return [...prev, product];
        });
      };

      const isInWishlist = (productId) => {
        return wishlist.some(item => item.id === productId);
      };

      const cartTotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const cartOriginalTotal = cart.reduce((sum, item) => sum + (item.originalPrice || item.price) * item.quantity, 0);
      const cartDiscount = cartOriginalTotal - cartTotal;
      const shippingFee = cartTotal >= 300000 ? 0 : 15000;
      const finalTotal = cartTotal + shippingFee;
      const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);

      const placeOrder = (orderInfo) => {
        const order = {
          id: Date.now(),
          items: [...cart],
          total: finalTotal,
          status: 'processing',
          date: new Date().toISOString(),
          ...orderInfo
        };
        setOrders(prev => [...prev, order]);
        setCart([]);
        return order;
      };

      return (
        <ShopContext.Provider value={{
          darkMode, setDarkMode,
          cart, addToCart, removeFromCart, updateQuantity,
          wishlist, toggleWishlist, isInWishlist,
          currentPage, setCurrentPage,
          selectedProduct, setSelectedProduct,
          searchQuery, setSearchQuery,
          selectedCategory, setSelectedCategory,
          showLogin, setShowLogin,
          isLogin, setIsLogin,
          userInfo, setUserInfo,
          cartTotal, cartOriginalTotal, cartDiscount, shippingFee, finalTotal, cartCount,
          placeOrder, orders
        }}>
          {children}
        </ShopContext.Provider>
      );
    };

    // ============ COMPONENTS ============

    // Navbar
    const Navbar = () => {
      const { darkMode, setDarkMode, cartCount, setCurrentPage, setShowLogin, isLogin, wishlist } = useContext(ShopContext);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return (
        <motion.nav
          initial={{ y: -100 }}
          animate={{ y: 0 }}
          className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${
            scrolled
              ? 'bg-white/90 dark:bg-zinc-950/90 backdrop-blur-xl shadow-lg'
              : 'bg-transparent'
          }`}
        >
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16 md:h-20">
              {/* Logo */}
              <motion.button
                whileHover={{ scale: 1.05 }}
                whileTap={{ scale: 0.95 }}
                onClick={() => setCurrentPage('home')}
                className="font-display text-2xl md:text-3xl font-bold tracking-tighter"
              >
                <span className="gradient-text">LUXE</span>
              </motion.button>

              {/* Desktop Navigation */}
              <div className="hidden md:flex items-center gap-8">
                {['Нүүр', 'Бүтээгдэхүүн', 'Хямдрал', 'Бидний тухай'].map((item, i) => (
                  <motion.button
                    key={i}
                    whileHover={{ y: -2 }}
                    className="text-sm font-medium text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white transition-colors"
                    onClick={() => i === 0 && setCurrentPage('home')}
                  >
                    {item}
                  </motion.button>
                ))}
              </div>

              {/* Actions */}
              <div className="flex items-center gap-2 md:gap-4">
                <motion.button
                  whileHover={{ scale: 1.1 }}
                  whileTap={{ scale: 0.9 }}
                  onClick={() => setDarkMode(!darkMode)}
                  className="p-2 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors"
                >
                  {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                </motion.button>

                <motion.button
                  whileHover={{ scale: 1.1 }}
                  whileTap={{ scale: 0.9 }}
                  onClick={() => setCurrentPage('wishlist')}
                  className="hidden md:flex p-2 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors relative"
                >
                  <Icons.Heart />
                  {wishlist.length > 0 && (
                    <span className="absolute -top-1 -right-1 w-4 h-4 bg-accent text-white text-xs rounded-full flex items-center justify-center">
                      {wishlist.length}
                    </span>
                  )}
                </motion.button>

                <motion.button
                  whileHover={{ scale: 1.1 }}
                  whileTap={{ scale: 0.9 }}
                  onClick={() => setCurrentPage('cart')}
                  className="p-2 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors relative"
                >
                  <Icons.Cart />
                  {cartCount > 0 && (
                    <span className="absolute -top-1 -right-1 w-4 h-4 bg-accent text-white text-xs rounded-full flex items-center justify-center">
                      {cartCount}
                    </span>
                  )}
                </motion.button>

                <motion.button
                  whileHover={{ scale: 1.05 }}
                  whileTap={{ scale: 0.95 }}
                  onClick={() => setShowLogin(true)}
                  className="hidden md:flex items-center gap-2 px-4 py-2 bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 rounded-full text-sm font-medium hover:bg-zinc-800 dark:hover:bg-zinc-100 transition-colors"
                >
                  <Icons.User />
                  {isLogin ? 'Профайл' : 'Нэвтрэх'}
                </motion.button>

                <motion.button
                  whileTap={{ scale: 0.9 }}
                  onClick={() => setMobileMenuOpen(true)}
                  className="md:hidden p-2"
                >
                  <Icons.Menu />
                </motion.button>
              </div>
            </div>
          </div>

          {/* Mobile Menu */}
          <AnimatePresence>
            {mobileMenuOpen && (
              <motion.div
                initial={{ opacity: 0, x: '100%' }}
                animate={{ opacity: 1, x: 0 }}
                exit={{ opacity: 0, x: '100%' }}
                transition={{ type: 'spring', damping: 25 }}
                className="fixed inset-0 bg-white dark:bg-zinc-950 z-50 md:hidden"
              >
                <div className="flex justify-end p-4">
                  <button onClick={() => setMobileMenuOpen(false)}>
                    <Icons.Close />
                  </button>
                </div>
                <div className="flex flex-col items-center gap-6 p-8">
                  {['Нүүр', 'Бүтээгдэхүүн', 'Хямдрал', 'Бидний тухай'].map((item, i) => (
                    <motion.button
                      key={i}
                      whileHover={{ x: 10 }}
                      className="text-xl font-medium"
                      onClick={() => {
                        if (i === 0) setCurrentPage('home');
                        setMobileMenuOpen(false);
                      }}
                    >
                      {item}
                    </motion.button>
                  ))}
                  <button
                    onClick={() => {
                      setShowLogin(true);
                      setMobileMenuOpen(false);
                    }}
                    className="mt-4 px-8 py-3 bg-accent text-white rounded-full font-medium"
                  >
                    Нэвтрэх
                  </button>
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </motion.nav>
      );
    };

    // Hero Section
    const Hero = () => {
      const { setCurrentPage } = useContext(ShopContext);

      return (
        <section className="relative min-h-screen flex items-center overflow-hidden noise-overlay">
          {/* Background Pattern */}
          <div className="absolute inset-0 opacity-30 dark:opacity-20">
            <div className="absolute inset-0" style={{
              backgroundImage: `radial-gradient(circle at 25% 25%, rgba(232,93,4,0.1) 0%, transparent 50%),
                               radial-gradient(circle at 75% 75%, rgba(232,93,4,0.05) 0%, transparent 50%)`
            }} />
          </div>

          {/* Floating Elements */}
          <motion.div
            animate={{ y: [-20, 20, -20], rotate: [0, 5, 0] }}
            transition={{ duration: 6, repeat: Infinity, ease: 'easeInOut' }}
            className="absolute top-1/4 right-10 w-64 h-64 bg-gradient-to-br from-accent/20 to-transparent rounded-full blur-3xl"
          />
          <motion.div
            animate={{ y: [20, -20, 20], rotate: [0, -5, 0] }}
            transition={{ duration: 8, repeat: Infinity, ease: 'easeInOut' }}
            className="absolute bottom-1/4 left-10 w-48 h-48 bg-gradient-to-br from-amber-500/20 to-transparent rounded-full blur-3xl"
          />

          <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 md:py-32">
            <div className="grid lg:grid-cols-2 gap-12 items-center">
              {/* Content */}
              <div className="text-center lg:text-left">
                <motion.div
                  initial={{ opacity: 0, y: 20 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ delay: 0.2 }}

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <h1 className="font-display text-3xl font-bold mb-8">Таны сагс</h1>

            {cart.length === 0 ? (
              <div className="text-center py-16">
                <div className="text-6xl mb-4">🛒</div>
                <h3 className="text-xl font-semibold mb-2">Таны сагс хоосон байна</h3>
                <p className="text-zinc-500 mb-6">Бүтээгдэхүүн нэмэхийн тулд дэлгүүр хэсэх</p>
                <motion.button
                  whileHover={{ scale: 1.05 }}
                  onClick={() => setCurrentPage('home')}
                  className="px-6 py-3 bg-accent text-white rounded-xl font-medium"
                >
                  Дэлгүүрлэх
                </motion.button>
              </div>
            ) : (
              <div className="grid lg:grid-cols-3 gap-8">
                {/* Cart Items */}
                <div className="lg:col-span-2 space-y-4">
                  {cart.map((item, i) => (
                    <motion.div
                      key={item.id}
                      initial={{ opacity: 0, x: -20 }}
                      animate={{ opacity: 1, x: 0 }}
                      transition={{ delay: i * 0.1 }}
                      className="flex gap-4 p-4 bg-zinc-50 dark:bg-zinc-900 rounded-2xl"
                    >
                      <div className="w-24 h-24 md:w-32 md:h-32 rounded-xl overflow-hidden flex-shrink-0">
                        <img src={item.image} alt={item.name} className="w-full h-full object-cover" />
                      </div>
                      <div className="flex-1 flex flex-col justify-between">
                        <div>
                          <h3 className="font-semibold text-lg line-clamp-1">{item.name}</h3>
                          <div className="flex items-center gap-2 mt-1">
                            <span className="font-bold text-accent">{formatPrice(item.price)}</span>
                            {item.originalPrice && (
                              <span className="text-sm text-zinc-400 line-through">
                                {formatPrice(item.originalPrice)}
                              </span>
                            )}
                          </div>
                        </div>
                        <div className="flex items-center justify-between">
                          <div className="flex items-center bg-white dark:bg-zinc-800 rounded-lg">
                            <button
                              onClick={() => updateQuantity(item.id, item.quantity - 1)}
                              className="w-8 h-8 flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-700 rounded-l-lg"
                            >
                              <Icons.Minus />
                            </button>
                            <span className="w-8 text-center text-sm font-medium">{item.quantity}</span>
                            <button
                              onClick={() => updateQuantity(item.id, item.quantity + 1)}
                              className="w-8 h-8 flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-700 rounded-r-lg"
                            >
                              <Icons.Plus />
                            </button>
                          </div>
                          <motion.button
                            whileHover={{ scale: 1.1 }}
                            whileTap={{ scale: 0.9 }}
                            onClick={() => removeFromCart(item.id)}
                            className="p-2 text-zinc-400 hover:text-red-500 transition-colors"
                          >
                            <Icons.Trash />
                          </motion.button>
                        </div>
                      </div>
                    </motion.div>
                  ))}
                </div>

                {/* Order Summary */}
                <div className="lg:sticky lg:top-28 h-fit">
                  <div className="bg-zinc-50 dark:bg-zinc-900 rounded-2xl p-6 space-y-4">
                    <h2 className="font-display text-xl font-bold">Захиалгын дүн</h2>
                    
                    <div className="space-y-3 text-sm">
                      <div className="flex justify-between">
                        <span className="text-zinc-500">Дундаж үнэ</span>
                        <span>{formatPrice(cartOriginalTotal)}</span>
                      </div>
                      {cartDiscount > 0 && (
                        <div className="flex justify-between text-green-500">
                          <span>Хямдрал</span>
                          <span>-{formatPrice(cartDiscount)}</span>
                        </div>
                      )}
                      <div className="flex justify-between">
                        <span className="text-zinc-500">Хүргэлт</span>
                        <span className={shippingFee === 0 ? 'text-green-500' : ''}>
                          {shippingFee === 0 ? 'Үнэгүй' : formatPrice(shippingFee)}
                        </span>
                      </div>
                      {shippingFee > 0 && (
                        <p className="text-xs text-zinc-400">
                          300,000₮ дээш захиалгаар үнэгүй хүргэнэ
                        </p>
                      )}
                    </div>

                    <div className="border-t border-zinc-200 dark:border-zinc-700 pt-4">
                      <div className="flex justify-between text-lg font-bold">
                        <span>Нийт</span>
                        <span className="text-accent">{formatPrice(finalTotal)}</span>
                      </div>
                    </div>

                    <motion.button
                      whileHover={{ scale: 1.02 }}
                      whileTap={{ scale: 0.98 }}
                      onClick={() => setCurrentPage('checkout')}
                      className="w-full py-4 bg-accent text-white rounded-xl font-semibold text-lg shadow-lg hover:shadow-xl transition-shadow"
                    >
                      Төлбөр төлөх
                    </motion.button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </motion.div>
      );
    };

    // Checkout Page
    const CheckoutPage = () => {
      const { cart, cartTotal, shippingFee, finalTotal, setCurrentPage, placeOrder, isLogin, setShowLogin } = useContext(ShopContext);
      const [formData, setFormData] = useState({
        firstName: '', lastName: '', email: '', phone: '',
        address: '', city: '', district: '', zipCode: ''
      });
      const [orderPlaced, setOrderPlaced] = useState(false);
      const [orderInfo, setOrderInfo] = useState(null);

      const handleSubmit = (e) => {
        e.preventDefault();
        const order = placeOrder(formData);
        setOrderInfo(order);
        setOrderPlaced(true);
      };

      if (!isLogin) {
        return (
          <motion.div
            initial={{ opacity: 0 }}
            animate={{ opacity: 1 }}
            className="min-h-screen pt-20 md:pt-24 flex items-center justify-center"
          >
            <div className="text-center">
              <div className="text-6xl mb-4">🔐</div>
              <h2 className="text-2xl font-bold mb-2">Нэвтрэх шаардлагатай</h2>
              <p className="text-zinc-500 mb-6">Захиалга өгхийн тулд нэвтэрнэ үү</p>
              <motion.button
                whileHover={{ scale: 1.05 }}
                onClick={() => setShowLogin(true)}
                className="px-6 py-3 bg-accent text-white rounded-xl font-medium"
              >
                Нэвтрэх
              </motion.button>
            </div>
          </motion.div>
        );
      }

      if (orderPlaced && orderInfo) {
        return (
          <motion.div
            initial={{ opacity: 0 }}
            animate={{ opacity: 1 }}
            className="min-h-screen pt-20 md:pt-24 flex items-center justify-center"
          >
            <div className="text-center max-w-md mx-auto px-4">
              <motion.div
                initial={{ scale: 0 }}
                animate={{ scale: 1 }}
                transition={{ type: 'spring', delay: 0.2 }}
                className="w-24 h-24 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6"
              >
                <Icons.Check />
              </motion.div>
              <h2 className="text-2xl font-bold mb-2">Захиалга амжилттай!</h2>
              <p className="text-zinc-500 mb-4">
                Таны захиалга #{orderInfo.id} амжилттай бүртгэгдлээ
              </p>
              <div className="bg-zinc-50 dark:bg-zinc-900 rounded-xl p-4 mb-6 text-left">
                <div className="flex justify-between mb-2">
                  <span className="text-zinc-500">Захиалгын дугаар</span>
                  <span className="font-medium">#{orderInfo.id}</span>
                </div>
                <div className="flex justify-between mb-2">
                  <span className="text-zinc-500">Статус</span>
                  <span className="px-2 py-1 bg-amber-100 dark:bg-amber-900/30 text-amber-600 text-sm rounded">
                    Боловсруулж байна
                  </span>
                </div>
                <div className="flex justify-between">
                  <span className="text-zinc-500">Нийт дүн</span>
                  <span className="font-bold text-accent">{formatPrice(orderInfo.total)}</span>
                </div>
              </div>
              <motion.button
                whileHover={{ scale: 1.05 }}
                onClick={() => setCurrentPage('home')}
                className="px-6 py-3 bg-accent text-white rounded-xl font-medium"
              >
                Нүүр хуудас руу буцах
              </motion.button>
            </div>
          </motion.div>
        );
      }

      return (
        <motion.div
          initial={{ opacity: 0 }}
          animate={{ opacity: 1 }}
          className="min-h-screen pt-20 md:pt-24 pb-12"
        >
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div className="flex items-center gap-4 mb-8">
              <motion.button
                whileHover={{ x: -5 }}
                onClick={() => setCurrentPage('cart')}
                className="text-zinc-500 hover:text-zinc-900 dark:hover:text-white"
              >
                <Icons.ArrowLeft />
              </motion.button>
              <h1 className="font-display text-3xl font-bold">Төлбөр төлөх</h1>
            </div>

            <div className="grid lg:grid-cols-3 gap-8">
              {/* Form */}
              <div className="lg:col-span-2">
                <form onSubmit={handleSubmit} className="space-y-6">
                  {/* Contact Info */}
                  <div className="bg-zinc-50 dark:bg-zinc-900 rounded-2xl p-6">
                    <h2 className="font-semibold text-lg mb-4">Холбоо барих</h2>
                    <div className="grid md:grid-cols-2 gap-4">
                      {[
                        { label: 'Нэр', key: 'firstName' },
                        { label: 'Овог', key: 'lastName' },
                        { label: 'Имэйл', key: 'email', type: 'email' },
                        { label: 'Утас', key: 'phone', type: 'tel' }
                      ].map((field) => (
                        <div key={field.key}>
                          <label className="block text-sm font-medium mb-2">{field.label}</label>
                          <input
                            type={field.type || 'text'}
                            value={formData[field.key]}
                            onChange={(e) => setFormData({...formData, [field.key]: e.target.value})}
                            className="w-full px-4 py-3 bg-white dark:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700 focus:ring-2 focus:ring-accent outline-none"
                            required
                          />
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Shipping Address */}
                  <div className="bg-zinc-50 dark:bg-zinc-900 rounded-2xl p-6">
                    <h2 className="font-semibold text-lg mb-4">Хүргэлтийн хаяг</h2>
                    <div className="space-y-4">
                      <div>
                        <label className="block text-sm font-medium mb-2">Хаяг</label>
                        <input
                          type="text"
                          value={formData.address}
                          onChange={(e) => setFormData({...formData, address: e.target.value})}
                          className="w-full px-4 py-3 bg-white dark:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700 focus:ring-2 focus:ring-accent outline-none"
                          required
                        />
                      </div>
                      <div className="grid md:grid-cols-3 gap-4">
                        {[
                          { label: 'Хот/Аймаг', key: 'city' },
                          { label: 'Дүүрэг/Сум', key: 'district' },
                          { label: 'Цайзын дугаар', key: 'zipCode' }
                        ].map((field) => (
                          <div key={field.key}>
                            <label className="block text-sm font-medium mb-2">{field.label}</label>
                            <input
                              type="text"
                              value={formData[field.key]}
                              onChange={(e) => setFormData({...formData, [field.key]: e.target.value})}
                              className="w-full px-4 py-3 bg-white dark:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700 focus:ring-2 focus:ring-accent outline-none"
                              required
                            />
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  <motion.button
                    whileHover={{ scale: 1.02 }}
                    whileTap={{ scale: 0.98 }}
                    type="submit"
                    className="w-full py-4 bg-accent text-white rounded-xl font-semibold text-lg shadow-lg hover:shadow-xl transition-shadow"
                  >
                    Захиалга баталгаажуулах
                  </motion.button>
                </form>
              </div>

              {/* Order Summary */}
              <div className="lg:sticky lg:top-28 h-fit">
                <div className="bg-zinc-50 dark:bg-zinc-900 rounded-2xl p-6">
                  <h2 className="font-semibold text-lg mb-4">Захиалга</h2>
                  <div className="space-y-3 mb-4">
                    {cart.map((item) => (
                      <div key={item.id} className="flex gap-3">
                        <div className="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0">
                          <img src={item.image} alt={item.name} className="w-full h-full object-cover" />
                        </div>
                        <div className="flex-1">
                          <p className="font-medium text-sm line-clamp-1">{item.name}</p>
                          <p className="text-sm text-zinc-500">x{item.quantity}</p>
                        </div>
                        <p className="font-medium text-sm">{formatPrice(item.price * item.quantity)}</p>
                      </div>
                    ))}
                  </div>
                  <div className="border-t border-zinc-200 dark:border-zinc-700 pt-4 space-y-2">
                    <div className="flex justify-between text-sm">
                      <span className="text-zinc-500">Дүн</span>
                      <span>{formatPrice(cartTotal)}</span>
                    </div>
                    <div className="flex justify-between text-sm">
                      <span className="text-zinc-500">Хүргэлт</span>
                      <span className={shippingFee === 0 ? 'text-green-500' : ''}>
                        {shippingFee === 0 ? 'Үнэгүй' : formatPrice(shippingFee)}
                      </span>
                    </div>
                    <div className="flex justify-between font-bold text-lg pt-2">
                      <span>Нийт</span>
                      <span className="text-accent">{formatPrice(finalTotal)}</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </motion.div>
      );
    };

    // Wishlist Page
    const WishlistPage = () => {
      const { wishlist, removeFromWishlist, addToCart, setCurrentPage } = useContext(ShopContext);

      return (
        <motion.div
          initial={{ opacity: 0 }}
          animate={{ opacity: 1 }}
          className="min-h-screen pt-20 md:pt-24 pb-12"
        >
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <h1 className="font-display text-3xl font-bold mb-8">Хүслийн жагсаалт</h1>

            {wishlist.length === 0 ? (
              <div className="text-center py-16">
                <div className="text-6xl mb-4">❤️</div>
                <h3 className="text-xl font-semibold mb-2">Хүслийн жагсаалт хоосон</h3>
                <p className="text-zinc-500 mb-6">Та таалагдсан бүтээгдэхүүнээ энд хадгална уу</p>
                <motion.button
                  whileHover={{ scale: 1.05 }}
                  onClick={() => setCurrentPage('home')}
                  className="px-6 py-3 bg-accent text-white rounded-xl font-medium"
                >
                  Дэлгүүрлэх
                </motion.button>
              </div>
            ) : (
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                {wishlist.map((product, i) => (
                  <ProductCard key={product.id} product={product} index={i} />
                ))}
              </div>
            )}
          </div>
        </motion.div>
      );
    };

    // Login Modal
    const LoginModal = () => {
      const { showLogin, setShowLogin, isLogin, setIsLogin, setUserInfo } = useContext(ShopContext);
      const [isRegister, setIsRegister] = useState(false);
      const [formData, setFormData] = useState({
        email: '', password: '', name: ''
      });

      const handleSubmit = (e) => {
        e.preventDefault();
        setIsLogin(true);
        setUserInfo({ name: formData.name || 'User', email: formData.email });
        setShowLogin(false);
      };

      return (
        <AnimatePresence>
          {showLogin && (
            <motion.div
              initial={{ opacity: 0 }}
              animate={{ opacity: 1 }}
              exit={{ opacity: 0 }}
              className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm"
              onClick={() => setShowLogin(false)}
            >
              <motion.div
                initial={{ scale: 0.9, opacity: 0 }}
                animate={{ scale: 1, opacity: 1 }}
                exit={{ scale: 0.9, opacity: 0 }}
                onClick={(e) => e.stopPropagation()}
                className="w-full max-w-md bg-white dark:bg-zinc-900 rounded-2xl p-8 shadow-2xl"
              >
                <div className="flex justify-between items-center mb-6">
                  <h2 className="font-display text-2xl font-bold">
                    {isRegister ? 'Бүртгүүлэх' : 'Нэвтрэх'}
                  </h2>
                  <button onClick={() => setShowLogin(false)}>
                    <Icons.Close />
                  </button>
                </div>

                <form onSubmit={handleSubmit} className="space-y-4">
                  {isRegister && (
                    <div>
                      <label className="block text-sm font-medium mb-2">Нэр</label>
                      <input
                        type="text"
                        value={formData.name}
                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                        className="w-full px-4 py-3 bg-zinc-100 dark:bg-zinc-800 rounded-xl border-0 focus:ring-2 focus:ring-accent outline-none"
                        required
                      />
                    </div>
                  )}
                  <div>
                    <label className="block text-sm font-medium mb-2">Имэйл</label>
                    <input
                      type="email"
                      value={formData.email}
                      onChange={(e) => setFormData({...formData, email: e.target.value})}
                      className="w-full px-4 py-3 bg-zinc-100 dark:bg-zinc-800 rounded-xl border-0 focus:ring-2 focus:ring-accent outline-none"
                      required
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-2">Нууц үг</label>
                    <input
                      type="password"
                      value={formData.password}
                      onChange={(e) => setFormData({...formData, password: e.target.value})}
                      className="w-full px-4 py-3 bg-zinc-100 dark:bg-zinc-800 rounded-xl border-0 focus:ring-2 focus:ring-accent outline-none"
                      required
                    />
                  </div>

                  <motion.button
                    whileHover={{ scale: 1.02 }}
                    whileTap={{ scale: 0.98 }}
                    type="submit"
                    className="w-full py-4 bg-accent text-white rounded-xl font-semibold text-lg"
                  >
                    {isRegister ? 'Бүртгүүлэх' : 'Нэвтрэх'}
                  </motion.button>
                </form>

                <p className="text-center mt-6 text-sm text-zinc-500">
                  {isRegister ? 'Бүртгэлтэй юу?' : 'Бүртгэл байхгүй юу?'}
                  <button
                    onClick={() => setIsRegister(!isRegister)}
                    className="ml-1 text-accent font-medium hover:underline"
                  >
                    {isRegister ? 'Нэвтрэх' : 'Бүртгүүлэх'}
                  </button>
                </p>
              </motion.div>
            </motion.div>
          )}
        </AnimatePresence>
      );
    };

    // Footer
    const Footer = () => {
      return (
        <footer className="bg-zinc-900 text-white py-16 mt-16">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="grid md:grid-cols-4 gap-8 mb-12">
              <div>
                <h3 className="font-display text-2xl font-bold gradient-text mb-4">LUXE</h3>
                <p className="text-zinc-400 text-sm">
                  Таны хэв маяг, таны лух харагдац. Дэлхийн шилдэг брэндүүд нэг дор.
                </p>
              </div>
              {[
                { title: 'Брэнд', items: ['Nike', 'Adidas', 'Zara', 'H&M'] },
                { title: 'Тусламж', items: ['Хүргэлт', 'Буцаалт', 'Түгээмэл асуулт', 'Холбоо барих'] },
                { title: 'Компани', items: ['Бидний тухай', 'Ажлын байр', 'Нууцлал', 'Нөхцөл'] }
              ].map((col, i) => (
                <div key={i}>
                  <h4 className="font-semibold mb-4">{col.title}</h4>
                  <ul className="space-y-2">
                    {col.items.map((item, j) => (
                      <li key={j}>
                        <a href="#" className="text-zinc-400 hover:text-white text-sm transition-colors">
                          {item}
                        </a>
                      </li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
            <div className="border-t border-zinc-800 pt-8 flex flex-col md:flex-row justify-between items-center gap-4">
              <p className="text-zinc-400 text-sm">
                © 2024 LUXE. Бүх эрх хуулиар хамгаалагдсан.
              </p>
              <div className="flex gap-4">
                {['📘', '📸', '🐦'].map((icon, i) => (
                  <a key={i} href="#" className="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center hover:bg-zinc-700 transition-colors">
                    {icon}
                  </a>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );
    };

    // ============ MAIN APP ============
    const App = () => {
      const { currentPage } = useContext(ShopContext);

      const renderPage = () => {
        switch (currentPage) {
          case 'product':
            return <ProductDetail />;
          case 'cart':
            return <CartPage />;
          case 'checkout':
            return <CheckoutPage />;
          case 'wishlist':
            return <WishlistPage />;
          case 'products':
            return (
              <>
                <SearchFilter />
                <ProductsGrid />
              </>
            );
          default:
            return (
              <>
                <Hero />
                <SearchFilter />
                <ProductsGrid />
                <CategoriesSection />
              </>
            );
        }
      };

      return (
        <div className="min-h-screen bg-white dark:bg-zinc-950 transition-colors duration-300">
          <Navbar />
          <main>
            <AnimatePresence mode="wait">
              <motion.div
                key={currentPage}
                initial={{ opacity: 0, y: 20 }}
                animate={{ opacity: 1, y: 0 }}
                exit={{ opacity: 0, y: -20 }}
                transition={{ duration: 0.3 }}
              >
                {renderPage()}
              </motion.div>
            </AnimatePresence>
          </main>
          <Footer />
          <LoginModal />
        </div>
      );
    };

    // ============ RENDER ============
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ShopProvider>
        <App />
      </ShopProvider>
    );
  </script>
</body>
</html>
